<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Pastel Animation</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff; /* 흰 배경 명시 */
      overflow: hidden;
    }

    /* 전체 화면을 덮는 컨테이너 */
    .animation-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      filter: blur(80px); /* 뭉게지는 효과 */
      z-index: -1; /* 배경 뒤로 배치 */
    }

    /* 일렁이는 요소 */
    .blob {
      position: absolute;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      opacity: 0.5;
      animation: drift 20s infinite alternate ease-in-out;
    }

    /* 파스텔톤 컬러 설정 */
    .blob:nth-child(1) { background: #FFD1DC; top: -10%; left: -10%; }
    .blob:nth-child(2) { background: #FFEFD5; top: 10%; right: -20%; animation-delay: -5s; }
    .blob:nth-child(3) { background: #E0FFFF; bottom: -20%; left: 20%; animation-delay: -10s; }
    .blob:nth-child(4) { background: #E6E6FA; bottom: 10%; right: 10%; animation-delay: -15s; }

    /* 움직임 애니메이션 */
    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20vw, 10vh) scale(1.2); }
      100% { transform: translate(-10vw, 20vh) scale(0.8); }
    }
  </style>
</head>
<body>

  <div class="animation-wrapper">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

</body>
</html>
